name: Release Assets

on:
  release:
    types:
      - published

permissions:
  contents: write
  id-token: write

jobs:
  build-assets:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_os: linux
            target_arch: x64
            ext: ""
          - os: macos-13
            target_os: darwin
            target_arch: x64
            ext: ""
          - os: macos-14
            target_os: darwin
            target_arch: arm64
            ext: ""
          - os: windows-latest
            target_os: windows
            target_arch: x64
            ext: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ github.event.release.tag_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: bun run build

      - name: Prepare asset (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          ASSET="facult-${VERSION}-${{ matrix.target_os }}-${{ matrix.target_arch }}${{ matrix.ext }}"
          cp dist/facult "dist/${ASSET}"
          chmod +x "dist/${ASSET}"

      - name: Prepare asset (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.event.release.tag_name }}".TrimStart("v")
          $asset = "facult-$version-${{ matrix.target_os }}-${{ matrix.target_arch }}${{ matrix.ext }}"
          if (Test-Path "dist/facult.exe") {
            Copy-Item "dist/facult.exe" "dist/$asset" -Force
          } else {
            Copy-Item "dist/facult" "dist/$asset" -Force
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: asset-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: dist/facult-*-${{ matrix.target_os }}-${{ matrix.target_arch }}${{ matrix.ext }}
          if-no-files-found: error

  publish-assets:
    runs-on: ubuntu-latest
    needs: build-assets
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ github.event.release.tag_name }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: asset-*
          merge-multiple: true
          path: dist/release-assets

      - name: Add install script + checksums
        shell: bash
        run: |
          set -euo pipefail
          cp scripts/install.sh dist/release-assets/facult-install.sh
          chmod +x dist/release-assets/facult-install.sh
          (
            cd dist/release-assets
            sha256sum * > SHA256SUMS
          )

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          fail_on_unmatched_files: true
          files: |
            dist/release-assets/*

  publish-npm:
    runs-on: ubuntu-latest
    needs: publish-assets
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ github.event.release.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.11.0"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate release tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "$VERSION" != "$PACKAGE_VERSION" ]]; then
            echo "Tag version ($VERSION) does not match package.json version ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Ensure NPM_TOKEN is configured
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${NPM_TOKEN:-}" ]]; then
            echo "NPM_TOKEN secret is required for npm publish."
            exit 1
          fi

      - name: Skip publish if version already exists on npm
        id: npm-check
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          if npm view "facult@${VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "facult@${VERSION} already exists on npm; skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm-check.outputs.exists == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
          HUSKY: "0"
        run: npm publish --access public --provenance
