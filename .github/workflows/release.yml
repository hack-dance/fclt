name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  semantic-release:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.11.0"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint and format checks
        run: bun run check

      - name: Typecheck
        run: bun run type-check

      - name: Test (CI-safe set)
        run: bun run test:ci

      - name: Build compiled binary
        run: bun run build

      - name: Verify compiled binary
        run: bun run build:verify

      - name: Verify npm package contents
        run: bun run pack:dry-run

      - name: Run semantic-release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import { appendFileSync } from "node:fs";
          import semanticRelease from "semantic-release";

          const outputPath = process.env.GITHUB_OUTPUT;
          if (!outputPath) {
            throw new Error("GITHUB_OUTPUT is not set.");
          }

          const result = await semanticRelease();
          if (!result || !result.nextRelease) {
            appendFileSync(outputPath, "released=false\n");
            console.log("No release published for this commit.");
            process.exit(0);
          }

          const version = String(result.nextRelease.version ?? "").trim();
          const tag = String(result.nextRelease.gitTag ?? "").trim();
          if (!version || !tag) {
            throw new Error("semantic-release completed without version/tag outputs.");
          }

          appendFileSync(outputPath, "released=true\n");
          appendFileSync(outputPath, `version=${version}\n`);
          appendFileSync(outputPath, `tag=${tag}\n`);
          console.log(`Published release ${tag}`);
          NODE

  build-assets:
    runs-on: ${{ matrix.os }}
    needs: semantic-release
    if: needs.semantic-release.outputs.released == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_os: linux
            target_arch: x64
            ext: ""
          - os: macos-15-intel
            target_os: darwin
            target_arch: x64
            ext: ""
          - os: macos-14
            target_os: darwin
            target_arch: arm64
            ext: ""
          - os: windows-latest
            target_os: windows
            target_arch: x64
            ext: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.semantic-release.outputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: bun run build

      - name: Verify binary (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: ./dist/fclt --help

      - name: Verify binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./dist/fclt.exe --help

      - name: Prepare asset (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.semantic-release.outputs.version }}"
          PRIMARY="fclt-${VERSION}-${{ matrix.target_os }}-${{ matrix.target_arch }}${{ matrix.ext }}"
          COMPAT="facult-${VERSION}-${{ matrix.target_os }}-${{ matrix.target_arch }}${{ matrix.ext }}"
          cp dist/fclt "dist/${PRIMARY}"
          cp dist/fclt "dist/${COMPAT}"
          chmod +x "dist/${PRIMARY}" "dist/${COMPAT}"

      - name: Prepare asset (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ needs.semantic-release.outputs.version }}"
          $primary = "fclt-$version-${{ matrix.target_os }}-${{ matrix.target_arch }}${{ matrix.ext }}"
          $compat = "facult-$version-${{ matrix.target_os }}-${{ matrix.target_arch }}${{ matrix.ext }}"
          if (Test-Path "dist/fclt.exe") {
            Copy-Item "dist/fclt.exe" "dist/$primary" -Force
            Copy-Item "dist/fclt.exe" "dist/$compat" -Force
          } else {
            Copy-Item "dist/fclt" "dist/$primary" -Force
            Copy-Item "dist/fclt" "dist/$compat" -Force
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: asset-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: |
            dist/fclt-*-${{ matrix.target_os }}-${{ matrix.target_arch }}${{ matrix.ext }}
            dist/facult-*-${{ matrix.target_os }}-${{ matrix.target_arch }}${{ matrix.ext }}
          if-no-files-found: error

  publish-assets:
    runs-on: ubuntu-latest
    needs: [semantic-release, build-assets]
    if: needs.semantic-release.outputs.released == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.semantic-release.outputs.tag }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: asset-*
          merge-multiple: true
          path: dist/release-assets

      - name: Add install script + checksums
        shell: bash
        run: |
          set -euo pipefail
          cp scripts/install.sh dist/release-assets/fclt-install.sh
          cp scripts/install.sh dist/release-assets/facult-install.sh
          chmod +x dist/release-assets/fclt-install.sh dist/release-assets/facult-install.sh
          (
            cd dist/release-assets
            sha256sum * > SHA256SUMS
          )

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.semantic-release.outputs.tag }}
          fail_on_unmatched_files: true
          files: |
            dist/release-assets/*

  publish-homebrew:
    runs-on: ubuntu-latest
    needs: [semantic-release, publish-assets]
    if: needs.semantic-release.outputs.released == 'true'
    steps:
      - name: Skip if tap token is not configured
        id: tap-token
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "HOMEBREW_TAP_TOKEN is not configured; skipping Homebrew tap publish."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout release tag
        if: steps.tap-token.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.semantic-release.outputs.tag }}

      - name: Setup Bun
        if: steps.tap-token.outputs.enabled == 'true'
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        if: steps.tap-token.outputs.enabled == 'true'
        run: bun install --frozen-lockfile

      - name: Download release assets
        if: steps.tap-token.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: asset-*
          merge-multiple: true
          path: dist/release-assets

      - name: Generate SHA256SUMS
        if: steps.tap-token.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          (
            cd dist/release-assets
            sha256sum * > SHA256SUMS
          )

      - name: Render Homebrew formula
        if: steps.tap-token.outputs.enabled == 'true'
        run: |
          bun run ./scripts/render-homebrew-formula.ts \
            --version "${{ needs.semantic-release.outputs.version }}" \
            --assets-dir dist/release-assets \
            --output dist/homebrew/Formula/fclt.rb

      - name: Write tap README
        if: steps.tap-token.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/homebrew
          cat > dist/homebrew/README.md <<'EOF'
          # hack-dance/homebrew-tap

          Homebrew tap for `fclt`.

          Install:

          ```bash
          brew tap hack-dance/tap
          brew install hack-dance/tap/fclt
          ```
          EOF

      - name: Publish formula to tap repo
        if: steps.tap-token.outputs.enabled == 'true'
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/hack-dance/homebrew-tap.git" tap-repo
          mkdir -p tap-repo/Formula
          cp dist/homebrew/Formula/fclt.rb tap-repo/Formula/fclt.rb
          cp dist/homebrew/README.md tap-repo/README.md
          cd tap-repo
          if [[ -z "$(git status --porcelain -- Formula/fclt.rb README.md)" ]]; then
            echo "No Homebrew tap changes to publish."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/fclt.rb README.md
          git commit -m "fclt ${{ needs.semantic-release.outputs.version }}"
          git push origin HEAD:main

  publish-npm:
    runs-on: ubuntu-latest
    needs: [semantic-release, publish-assets]
    if: needs.semantic-release.outputs.released == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.semantic-release.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.11.0"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate release tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.semantic-release.outputs.version }}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "$VERSION" != "$PACKAGE_VERSION" ]]; then
            echo "Tag version ($VERSION) does not match package.json version ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Smoke test npm bootstrap launcher against release asset
        shell: bash
        run: |
          set -euo pipefail
          HOME="$(mktemp -d)"
          export HOME
          node ./bin/fclt.cjs --help

      - name: Smoke test release install script against release asset
        shell: bash
        run: |
          set -euo pipefail
          TMP_HOME="$(mktemp -d)"
          TMP_BIN="$(mktemp -d)"
          FACULT_VERSION="${{ needs.semantic-release.outputs.version }}" \
          FACULT_INSTALL_DIR="$TMP_BIN" \
          HOME="$TMP_HOME" \
          bash ./scripts/install.sh
          "$TMP_BIN/fclt" --help
          "$TMP_BIN/facult" --help

      - name: Ensure NPM_TOKEN is configured
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${NPM_TOKEN:-}" ]]; then
            echo "NPM_TOKEN secret is required for npm publish."
            exit 1
          fi

      - name: Skip publish if version already exists on npm
        id: npm-check
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.semantic-release.outputs.version }}"
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${VERSION} already exists on npm; skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm-check.outputs.exists == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
          HUSKY: "0"
        run: npm publish --access public --provenance
