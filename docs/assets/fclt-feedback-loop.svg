<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">fclt AI capability feedback loop</title>
  <desc id="desc">A diagram showing fclt installed once, agents using canonical capability, work units producing writebacks, repeated signal becoming evolution proposals, and accepted changes improving future agents.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#1f2937" />
    </marker>
    <marker id="softArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#5b6472" />
    </marker>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#111827" flood-opacity="0.12" />
    </filter>
    <style>
      .bg { fill: #f7f5ef; }
      .panel { fill: #ffffff; stroke: #d9d5c9; stroke-width: 2; filter: url(#cardShadow); }
      .soft { fill: #f1efe7; stroke: #d9d5c9; stroke-width: 2; }
      .global { fill: #eef6f2; stroke: #80aa95; stroke-width: 2; }
      .project { fill: #f7f1e7; stroke: #bf9868; stroke-width: 2; }
      .review { fill: #eef1f8; stroke: #879bc3; stroke-width: 2; }
      .warn { fill: #fff7e6; stroke: #d8a441; stroke-width: 2; }
      .title { fill: #111827; font: 700 34px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .subtitle { fill: #4b5563; font: 400 18px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .h { fill: #111827; font: 700 20px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .body { fill: #374151; font: 400 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #4b5563; font: 400 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #1f2937; font: 600 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .label { fill: #ffffff; font: 700 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.5px; }
      .arrow { fill: none; stroke: #1f2937; stroke-width: 3; marker-end: url(#arrow); }
      .softArrow { fill: none; stroke: #5b6472; stroke-width: 2.5; stroke-dasharray: 7 7; marker-end: url(#softArrow); }
      .loop { fill: none; stroke: #1f2937; stroke-width: 3.2; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1200" height="720" rx="0" />

  <text class="title" x="64" y="68">fclt turns agent friction into better future agents</text>
  <text class="subtitle" x="64" y="100">The CLI is setup and review infrastructure. Day to day, agents use it in the background to preserve signal and evolve capability.</text>

  <rect class="soft" x="64" y="136" width="258" height="118" rx="14" />
  <rect x="88" y="160" width="88" height="24" rx="12" fill="#111827" />
  <text class="label" x="107" y="177">SETUP</text>
  <text class="h" x="88" y="210">Install once</text>
  <text class="body" x="88" y="235">Bootstrap global and project roots.</text>
  <text class="mono" x="88" y="258">operating-model pack</text>

  <rect class="global" x="418" y="132" width="326" height="148" rx="16" />
  <text class="h" x="444" y="166">Canonical capability</text>
  <text class="body" x="444" y="194">Reusable source of truth, not chat memory.</text>
  <text class="mono" x="444" y="223">~/.ai/instructions</text>
  <text class="mono" x="444" y="245">~/.ai/snippets</text>
  <text class="mono" x="444" y="267">~/.ai/skills</text>

  <rect class="project" x="790" y="132" width="326" height="148" rx="16" />
  <text class="h" x="816" y="166">Project capability</text>
  <text class="body" x="816" y="194">Repo-local guidance that travels with code.</text>
  <text class="mono" x="816" y="223">&lt;repo&gt;/.ai/instructions</text>
  <text class="mono" x="816" y="245">&lt;repo&gt;/.ai/skills</text>
  <text class="mono" x="816" y="263">&lt;repo&gt;/.ai/config.toml</text>

  <path class="arrow" d="M322 195 H400" />
  <path class="softArrow" d="M744 206 H774" />

  <rect class="panel" x="104" y="338" width="252" height="132" rx="16" />
  <text class="h" x="130" y="373">Agents work normally</text>
  <text class="body" x="130" y="402">Codex, Claude, Cursor, and peers</text>
  <text class="body" x="130" y="425">read available capability.</text>
  <text class="small" x="130" y="454">Most users do not run CLI commands here.</text>

  <rect class="panel" x="468" y="338" width="264" height="132" rx="16" />
  <text class="h" x="494" y="373">Work units create evidence</text>
  <text class="body" x="494" y="402">Each task has a goal, context,</text>
  <text class="body" x="494" y="425">constraints, checks, and output.</text>
  <text class="small" x="494" y="454">Strong feedback loops expose friction early.</text>

  <rect class="panel" x="844" y="338" width="252" height="132" rx="16" />
  <text class="h" x="870" y="373">Writebacks preserve signal</text>
  <text class="body" x="870" y="402">Agents record missing context, weak checks,</text>
  <text class="body" x="870" y="425">stale guidance, or tool friction.</text>
  <text class="mono" x="870" y="454">~/.ai/writebacks/...</text>

  <path class="arrow" d="M520 280 C462 316 350 330 250 338" />
  <path class="arrow" d="M952 280 V318 C952 328 960 332 970 338" />
  <path class="arrow" d="M356 404 H448" />
  <path class="arrow" d="M732 404 H824" />

  <rect class="review" x="286" y="552" width="280" height="108" rx="16" />
  <text class="h" x="312" y="585">Evolution review</text>
  <text class="body" x="312" y="614">Repeated signal becomes a small</text>
  <text class="body" x="312" y="637">proposal: update, create, extract, add.</text>

  <rect class="warn" x="640" y="552" width="280" height="108" rx="16" />
  <text class="h" x="666" y="585">Human-safe apply</text>
  <text class="body" x="666" y="614">Project markdown can be low risk.</text>
  <text class="body" x="666" y="637">Global instructions and skills need review.</text>

  <path class="arrow" d="M970 470 V514 C970 536 905 526 820 526 H426 V552" />
  <path class="arrow" d="M566 606 H620" />
  <path class="loop" d="M780 660 C780 696 1152 696 1152 312 C1152 288 1110 280 1084 280" />

  <rect class="soft" x="64" y="558" width="154" height="76" rx="14" />
  <text class="h" x="88" y="590">CLI moments</text>
  <text class="small" x="88" y="613">install, inspect, audit,</text>
  <text class="small" x="88" y="632">review, approve</text>

  <rect class="soft" x="960" y="558" width="156" height="76" rx="14" />
  <text class="h" x="984" y="590">Background loop</text>
  <text class="small" x="984" y="613">agents record and</text>
  <text class="small" x="984" y="632">reuse improvements</text>
</svg>
